<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Game Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="status-bar">
    <span id="status-indicator" class="status-dot disconnected"></span>
    <span id="status-text">Disconnected</span>
    <span id="player-badge">P1</span>
  </div>

  <div id="connect-screen">
    <h1>Game Controller</h1>
    <p>Enter the server address shown on your computer</p>
    <input type="text" id="server-address" placeholder="192.168.x.x:3000" value="">
    <button id="connect-btn">Connect</button>
    <p id="connect-error" class="error hidden">Could not connect. Check the address.</p>
  </div>

  <div id="controller" class="hidden">
    <div class="controller-left">
      <div class="dpad">
        <button class="dpad-btn" data-action="up">▲</button>
        <div class="dpad-row">
          <button class="dpad-btn" data-action="left">◀</button>
          <div class="dpad-center"></div>
          <button class="dpad-btn" data-action="right">▶</button>
        </div>
        <button class="dpad-btn" data-action="down">▼</button>
      </div>
    </div>
    <div class="controller-right">
      <div class="face-buttons">
        <div class="face-row">
          <button class="face-btn" data-action="face_x">X</button>
          <button class="face-btn" data-action="face_y">Y</button>
        </div>
        <div class="face-row">
          <button class="face-btn" data-action="face_a">A</button>
          <button class="face-btn" data-action="face_b">B</button>
        </div>
      </div>
    </div>
    <button id="disconnect-btn" class="hidden">Disconnect</button>
  </div>

  <script src="controller.js"></script>
</body>
</html>
